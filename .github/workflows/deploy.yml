name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p _site/src _site/assets/icon
          cp index.html _site/
          cp src/*.js _site/src/
          cp assets/icon/*.webp _site/assets/icon/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp jf-openhuninn-2.1.ttf _site/
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
